tf_rmse_plot_node:
  ros__parameters:
    parent_frame: map
    ekf_frame: wrist_strap_ekf
    truth_frame: wrist_strap_truth
    sample_rate_hz: 2.0
    plot_rate_hz: 2.0
    max_points: 3000
    frame_axis_len: 0.06
    trail_axis_len: 0.025
    orientation_trail_stride: 25
    show_orientation_trail: true

    save_figure: false
    save_path: /tmp/tf_rmse_plot.png
    save_dpi: 300
    save_every_n_updates: 10
    save_on_shutdown: true
